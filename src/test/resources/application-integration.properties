# ===== 통합 테스트 기본 설정 =====
#
# 이 파일은 두 가지 용도로 사용된다:
#
# 1) StockManagementApiApplicationTests (contextLoads 전용)
#    - H2 in-memory + MockBean RedissonClient + NoOpCacheManager
#    - 아래 설정이 그대로 적용됨
#
# 2) AbstractIntegrationTest 서브클래스 (실제 통합 테스트)
#    - @DynamicPropertySource가 MySQL·Redis Testcontainers 값으로 오버라이드
#    - 아래 H2/Flyway/Cache 설정은 무시됨

# H2 In-Memory (contextLoads 전용; AbstractIntegrationTest에서는 Testcontainers MySQL로 오버라이드)
spring.datasource.url=jdbc:h2:mem:testdb;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.flyway.enabled=false

# TossPayments: 통합 테스트에서 호출 없음 (placeholder 그대로 사용)
toss.secret-key=test_sk_placeholder
toss.client-key=test_ck_placeholder

# Cache: contextLoads 전용 NoOpCacheManager (AbstractIntegrationTest에서는 redis로 오버라이드)
spring.cache.type=none

# Spring Boot Admin: 테스트에서 서버 등록 시도 비활성화
spring.boot.admin.client.enabled=false

# 주문 만료 스케줄러: 통합 테스트 중 간섭 방지를 위해 비활성화
order.expiry.enabled=false

# Elasticsearch: contextLoads 전용 더미 URI (AbstractIntegrationTest에서 Testcontainer URI로 오버라이드)
spring.elasticsearch.uris=http://localhost:19200

