# ===== 통합 테스트용 H2 In-Memory DB =====
# MySQL 호환 모드 + AUTO_INCREMENT 지원
spring.datasource.url=jdbc:h2:mem:testdb;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Hibernate가 엔티티로부터 스키마를 자동 생성/삭제
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# Flyway: MySQL 전용 DDL이 포함된 마이그레이션을 H2에서 실행하지 않음
spring.flyway.enabled=false

# TossPayments: 통합 테스트에서 호출 없음 (placeholder 그대로 사용)
toss.secret-key=test_sk_placeholder
toss.client-key=test_ck_placeholder

# Cache: 통합 테스트에서 Redis 연결 없이 NoOpCacheManager 사용
spring.cache.type=none
