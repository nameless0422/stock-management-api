<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>재고 관리 시스템 - 관리자</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    body { background: #f0f2f5; }
    .navbar { background: #1a1a2e !important; }
    .nav-tabs .nav-link { color: #495057; font-weight: 500; }
    .nav-tabs .nav-link.active { color: #1a1a2e; font-weight: 700; border-bottom: 3px solid #1a1a2e; }
    .stat-card { border: none; border-radius: 12px; transition: transform .15s; }
    .stat-card:hover { transform: translateY(-2px); }
    .stat-icon { width: 48px; height: 48px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 1.4rem; }
    .badge-PENDING   { background:#ffc107; color:#000; }
    .badge-CONFIRMED { background:#198754; color:#fff; }
    .badge-CANCELLED { background:#6c757d; color:#fff; }
    .badge-DONE      { background:#198754; color:#fff; }
    .badge-FAILED    { background:#dc3545; color:#fff; }
    .badge-USER      { background:#0dcaf0; color:#000; }
    .badge-ADMIN     { background:#1a1a2e; color:#fff; }
    .badge-ACTIVE       { background:#198754; color:#fff; }
    .badge-DISCONTINUED { background:#6c757d; color:#fff; }
    .table-hover tbody tr:hover { background: #f8f9ff; }
    #loginScreen { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); }
    .login-card { width: 380px; border-radius: 16px; border: none; box-shadow: 0 20px 60px rgba(0,0,0,.3); }
    .stock-bar { height: 6px; border-radius: 3px; background: #e9ecef; position: relative; }
    .stock-fill { height: 100%; border-radius: 3px; transition: width .3s; }
    .bulk-row td { vertical-align: middle; }
    #app { display: none; }
  </style>
</head>
<body>

<!-- 토스트 알림 -->
<div class="toast-container position-fixed top-0 end-0 p-3" style="z-index:9999">
  <div id="toast" class="toast align-items-center border-0" role="alert">
    <div class="d-flex">
      <div class="toast-body fw-semibold" id="toastMsg"></div>
      <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
    </div>
  </div>
</div>

<!-- ─── 로그인 화면 ─── -->
<div id="loginScreen">
  <div class="card login-card p-4">
    <div class="text-center mb-4">
      <div class="fs-1 mb-2">📦</div>
      <h4 class="fw-bold mb-1">재고 관리 시스템</h4>
      <small class="text-muted">관리자 전용</small>
    </div>
    <form id="loginForm">
      <div class="mb-3">
        <label class="form-label fw-semibold">아이디</label>
        <input id="loginUsername" type="text" class="form-control form-control-lg" placeholder="username" autofocus>
      </div>
      <div class="mb-4">
        <label class="form-label fw-semibold">비밀번호</label>
        <input id="loginPassword" type="password" class="form-control form-control-lg" placeholder="password">
      </div>
      <div id="loginError" class="alert alert-danger d-none py-2 mb-3"></div>
      <button type="submit" class="btn btn-dark btn-lg w-100 fw-bold">
        <span id="loginSpinner" class="spinner-border spinner-border-sm me-2 d-none"></span>로그인
      </button>
    </form>
  </div>
</div>

<!-- ─── 메인 앱 ─── -->
<div id="app">
  <!-- 네비게이션 바 -->
  <nav class="navbar navbar-dark px-4 py-3 mb-0">
    <span class="navbar-brand fw-bold fs-5">📦 재고 관리 시스템</span>
    <div class="d-flex align-items-center gap-3">
      <span class="text-white-50 small"><i class="bi bi-person-circle me-1"></i><span id="navUsername"></span></span>
      <button class="btn btn-outline-light btn-sm" onclick="logout()"><i class="bi bi-box-arrow-right me-1"></i>로그아웃</button>
    </div>
  </nav>

  <!-- 탭 네비게이션 -->
  <div class="bg-white border-bottom px-4">
    <ul class="nav nav-tabs border-0" id="mainTabs">
      <li class="nav-item"><a class="nav-link active px-4 py-3" data-tab="dashboard" href="#"><i class="bi bi-grid me-2"></i>대시보드</a></li>
      <li class="nav-item"><a class="nav-link px-4 py-3" data-tab="inventory" href="#"><i class="bi bi-box-seam me-2"></i>재고 관리</a></li>
      <li class="nav-item"><a class="nav-link px-4 py-3" data-tab="orders" href="#"><i class="bi bi-bag me-2"></i>주문 관리</a></li>
      <li class="nav-item"><a class="nav-link px-4 py-3" data-tab="users" href="#"><i class="bi bi-people me-2"></i>사용자 관리</a></li>
    </ul>
  </div>

  <div class="container-fluid p-4">

    <!-- ─── 대시보드 ─── -->
    <div id="tab-dashboard">
      <div class="row g-3 mb-4">
        <div class="col-6 col-lg-2">
          <div class="card stat-card p-3 h-100">
            <div class="stat-icon bg-primary bg-opacity-10 text-primary mb-2"><i class="bi bi-bag"></i></div>
            <div class="text-muted small">총 주문</div>
            <div class="fw-bold fs-4" id="d-total">-</div>
          </div>
        </div>
        <div class="col-6 col-lg-2">
          <div class="card stat-card p-3 h-100">
            <div class="stat-icon bg-warning bg-opacity-10 text-warning mb-2"><i class="bi bi-hourglass-split"></i></div>
            <div class="text-muted small">대기 중</div>
            <div class="fw-bold fs-4" id="d-pending">-</div>
          </div>
        </div>
        <div class="col-6 col-lg-2">
          <div class="card stat-card p-3 h-100">
            <div class="stat-icon bg-success bg-opacity-10 text-success mb-2"><i class="bi bi-check-circle"></i></div>
            <div class="text-muted small">완료</div>
            <div class="fw-bold fs-4" id="d-confirmed">-</div>
          </div>
        </div>
        <div class="col-6 col-lg-2">
          <div class="card stat-card p-3 h-100">
            <div class="stat-icon bg-secondary bg-opacity-10 text-secondary mb-2"><i class="bi bi-x-circle"></i></div>
            <div class="text-muted small">취소</div>
            <div class="fw-bold fs-4" id="d-cancelled">-</div>
          </div>
        </div>
        <div class="col-6 col-lg-2">
          <div class="card stat-card p-3 h-100">
            <div class="stat-icon bg-danger bg-opacity-10 text-danger mb-2"><i class="bi bi-currency-exchange"></i></div>
            <div class="text-muted small">총 매출</div>
            <div class="fw-bold fs-5" id="d-revenue">-</div>
          </div>
        </div>
        <div class="col-6 col-lg-2">
          <div class="card stat-card p-3 h-100">
            <div class="stat-icon bg-info bg-opacity-10 text-info mb-2"><i class="bi bi-people"></i></div>
            <div class="text-muted small">사용자 수</div>
            <div class="fw-bold fs-4" id="d-users">-</div>
          </div>
        </div>
      </div>

      <div class="card border-0 shadow-sm">
        <div class="card-header bg-white fw-bold py-3">
          <i class="bi bi-exclamation-triangle text-warning me-2"></i>저재고 경보 <span class="badge bg-danger ms-1" id="d-lowstock-count">0</span>
          <small class="text-muted fw-normal ms-2">(가용재고 < 10)</small>
        </div>
        <div class="card-body p-0">
          <table class="table table-hover mb-0">
            <thead class="table-light"><tr>
              <th>상품명</th><th>SKU</th><th>실재고</th><th>예약</th><th>배정</th><th>가용</th><th></th>
            </tr></thead>
            <tbody id="lowStockBody"><tr><td colspan="7" class="text-center text-muted py-4">저재고 상품 없음</td></tr></tbody>
          </table>
        </div>
      </div>
    </div>

    <!-- ─── 재고 관리 ─── -->
    <div id="tab-inventory" style="display:none">

      <!-- 상품 목록 + 재고 현황 -->
      <div class="card border-0 shadow-sm mb-4">
        <div class="card-header bg-white d-flex justify-content-between align-items-center py-3">
          <span class="fw-bold"><i class="bi bi-box-seam me-2"></i>상품별 재고 현황</span>
          <div class="input-group" style="width:280px">
            <input id="productSearch" type="text" class="form-control form-control-sm" placeholder="상품명 또는 SKU 검색">
            <button class="btn btn-outline-secondary btn-sm" onclick="loadProducts(0)"><i class="bi bi-search"></i></button>
          </div>
        </div>
        <div class="card-body p-0">
          <table class="table table-hover align-middle mb-0">
            <thead class="table-light"><tr>
              <th>상품명</th><th>SKU</th><th>가격</th><th>상태</th>
              <th>가용 / 실재고</th><th>예약</th><th>배정</th><th class="text-end">액션</th>
            </tr></thead>
            <tbody id="productTableBody"><tr><td colspan="8" class="text-center py-4"><div class="spinner-border spinner-border-sm"></div></td></tr></tbody>
          </table>
        </div>
        <div class="card-footer bg-white d-flex justify-content-between align-items-center" id="productPager"></div>
      </div>

      <!-- 일괄 입고 -->
      <div class="card border-0 shadow-sm">
        <div class="card-header bg-white fw-bold py-3">
          <i class="bi bi-arrow-down-circle text-success me-2"></i>일괄 입고 처리
        </div>
        <div class="card-body">
          <table class="table align-middle mb-3" id="bulkTable">
            <thead class="table-light"><tr><th style="width:40%">상품 ID</th><th style="width:40%">입고 수량</th><th></th></tr></thead>
            <tbody id="bulkBody"></tbody>
          </table>
          <div class="d-flex gap-2">
            <button class="btn btn-outline-secondary btn-sm" onclick="addBulkRow()"><i class="bi bi-plus-circle me-1"></i>행 추가</button>
            <button class="btn btn-success btn-sm" onclick="submitBulk()"><i class="bi bi-check-all me-1"></i>전체 입고 처리</button>
          </div>
        </div>
      </div>
    </div>

    <!-- ─── 주문 관리 ─── -->
    <div id="tab-orders" style="display:none">
      <div class="card border-0 shadow-sm">
        <div class="card-header bg-white py-3">
          <div class="d-flex gap-2 flex-wrap">
            <button class="btn btn-dark btn-sm order-filter-btn active" data-status="">전체</button>
            <button class="btn btn-outline-warning btn-sm order-filter-btn" data-status="PENDING">대기 중</button>
            <button class="btn btn-outline-success btn-sm order-filter-btn" data-status="CONFIRMED">완료</button>
            <button class="btn btn-outline-secondary btn-sm order-filter-btn" data-status="CANCELLED">취소</button>
          </div>
        </div>
        <div class="card-body p-0">
          <table class="table table-hover align-middle mb-0">
            <thead class="table-light"><tr>
              <th>주문 ID</th><th>사용자 ID</th><th>상태</th><th>금액</th><th>주문일시</th><th class="text-end">액션</th>
            </tr></thead>
            <tbody id="ordersBody"><tr><td colspan="6" class="text-center py-4"><div class="spinner-border spinner-border-sm"></div></td></tr></tbody>
          </table>
        </div>
        <div class="card-footer bg-white d-flex justify-content-between align-items-center" id="ordersPager"></div>
      </div>
    </div>

    <!-- ─── 사용자 관리 ─── -->
    <div id="tab-users" style="display:none">
      <div class="card border-0 shadow-sm">
        <div class="card-header bg-white fw-bold py-3"><i class="bi bi-people me-2"></i>전체 사용자</div>
        <div class="card-body p-0">
          <table class="table table-hover align-middle mb-0">
            <thead class="table-light"><tr>
              <th>ID</th><th>아이디</th><th>이메일</th><th>권한</th><th>가입일</th><th class="text-end">액션</th>
            </tr></thead>
            <tbody id="usersBody"><tr><td colspan="6" class="text-center py-4"><div class="spinner-border spinner-border-sm"></div></td></tr></tbody>
          </table>
        </div>
        <div class="card-footer bg-white d-flex justify-content-between align-items-center" id="usersPager"></div>
      </div>
    </div>

  </div>
</div>

<!-- ─── 입고 처리 모달 ─── -->
<div class="modal fade" id="receiveModal" tabindex="-1">
  <div class="modal-dialog modal-sm modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header">
        <h6 class="modal-title fw-bold"><i class="bi bi-arrow-down-circle text-success me-2"></i>입고 처리</h6>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <p class="mb-3 small text-muted" id="receiveProductName"></p>
        <label class="form-label fw-semibold">입고 수량</label>
        <input id="receiveQty" type="number" class="form-control" min="1" value="1">
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary btn-sm" data-bs-dismiss="modal">취소</button>
        <button class="btn btn-success btn-sm" onclick="submitReceive()">입고 처리</button>
      </div>
    </div>
  </div>
</div>

<!-- ─── 재고 이력 모달 ─── -->
<div class="modal fade" id="historyModal" tabindex="-1">
  <div class="modal-dialog modal-lg modal-dialog-centered modal-dialog-scrollable">
    <div class="modal-content">
      <div class="modal-header">
        <h6 class="modal-title fw-bold"><i class="bi bi-clock-history me-2"></i>재고 변동 이력 — <span id="historyProductName"></span></h6>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body p-0">
        <table class="table table-sm align-middle mb-0">
          <thead class="table-light sticky-top"><tr>
            <th>유형</th><th class="text-end">변동량</th><th class="text-end">실재고</th><th class="text-end">예약</th><th class="text-end">배정</th><th>일시</th>
          </tr></thead>
          <tbody id="historyBody"></tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
'use strict';

// ─── 상태 ───────────────────────────────────────────────
let token        = localStorage.getItem('admin_token');
let currentUser  = null;
let receiveProductId   = null;
let productPage  = 0;
let ordersPage   = 0;
let ordersStatus = '';
let usersPage    = 0;

// ─── 유틸 ───────────────────────────────────────────────
const fmt = {
  money:  n  => Number(n).toLocaleString('ko-KR') + '원',
  date:   dt => dt ? new Date(dt).toLocaleString('ko-KR', {hour12:false}) : '-',
  badge: (val, map) => `<span class="badge badge-${val}">${map[val] ?? val}</span>`,
};

const txTypeLabel = {
  RECEIVE:              '입고',
  RESERVE:              '예약',
  RELEASE_RESERVATION:  '예약 해제',
  CONFIRM_ALLOCATION:   '배정 확정',
  RELEASE_ALLOCATION:   '배정 해제',
};

const statusLabel = { PENDING:'대기 중', CONFIRMED:'완료', CANCELLED:'취소' };

function pager(page, totalPages, loadFn) {
  if (totalPages <= 1) return '';
  return `
    <span class="text-muted small">${page + 1} / ${totalPages} 페이지</span>
    <div class="btn-group btn-group-sm">
      <button class="btn btn-outline-secondary" ${page === 0 ? 'disabled' : ''} onclick="${loadFn}(${page-1})"><i class="bi bi-chevron-left"></i></button>
      <button class="btn btn-outline-secondary" ${page >= totalPages-1 ? 'disabled' : ''} onclick="${loadFn}(${page+1})"><i class="bi bi-chevron-right"></i></button>
    </div>`;
}

function stockBar(available, onHand) {
  const pct = onHand === 0 ? 0 : Math.min(100, Math.round(available / onHand * 100));
  const color = pct > 30 ? '#198754' : pct > 10 ? '#ffc107' : '#dc3545';
  return `<div class="stock-bar"><div class="stock-fill" style="width:${pct}%;background:${color}"></div></div>
          <small class="text-muted">${available} / ${onHand}</small>`;
}

// ─── API ────────────────────────────────────────────────
async function api(method, path, body) {
  try {
    const res = await fetch(path, {
      method,
      headers: {
        'Content-Type': 'application/json',
        ...(token ? { 'Authorization': `Bearer ${token}` } : {}),
      },
      body: body ? JSON.stringify(body) : undefined,
    });

    if (res.status === 401 || res.status === 403) { logout(); return null; }

    const json = await res.json();
    if (!json.success) throw new Error(json.message || '오류');
    return json.data;
  } catch (e) {
    showToast(e.message, 'danger');
    return null;
  }
}

// ─── 인증 ───────────────────────────────────────────────
document.getElementById('loginForm').addEventListener('submit', async e => {
  e.preventDefault();
  const username = document.getElementById('loginUsername').value.trim();
  const password = document.getElementById('loginPassword').value;
  const err      = document.getElementById('loginError');
  const spinner  = document.getElementById('loginSpinner');

  err.classList.add('d-none');
  spinner.classList.remove('d-none');

  try {
    const res = await fetch('/api/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password }),
    });
    const json = await res.json();
    if (!json.success) throw new Error(json.message || '로그인 실패');

    token = json.data.accessToken;
    localStorage.setItem('admin_token', token);
    currentUser = username;
    showApp();
  } catch (e) {
    err.textContent = e.message;
    err.classList.remove('d-none');
  } finally {
    spinner.classList.add('d-none');
  }
});

function showApp() {
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  document.getElementById('navUsername').textContent = currentUser ?? '관리자';
  loadDashboard();
  addBulkRow();
}

function logout() {
  localStorage.removeItem('admin_token');
  token = null;
  currentUser = null;
  document.getElementById('loginScreen').style.display = '';
  document.getElementById('app').style.display = 'none';
}

// ─── 탭 전환 ────────────────────────────────────────────
const tabIds = { dashboard:'tab-dashboard', inventory:'tab-inventory', orders:'tab-orders', users:'tab-users' };

document.querySelectorAll('[data-tab]').forEach(link => {
  link.addEventListener('click', e => {
    e.preventDefault();
    document.querySelectorAll('[data-tab]').forEach(l => l.classList.remove('active'));
    link.classList.add('active');
    Object.values(tabIds).forEach(id => document.getElementById(id).style.display = 'none');
    const tab = link.dataset.tab;
    document.getElementById(tabIds[tab]).style.display = '';
    if (tab === 'dashboard') loadDashboard();
    if (tab === 'inventory') loadProducts(0);
    if (tab === 'orders')    loadOrders(0, ordersStatus);
    if (tab === 'users')     loadUsers(0);
  });
});

// ─── 대시보드 ────────────────────────────────────────────
async function loadDashboard() {
  const d = await api('GET', '/api/admin/dashboard');
  if (!d) return;

  document.getElementById('d-total').textContent     = d.totalOrders.toLocaleString();
  document.getElementById('d-pending').textContent   = d.pendingOrders.toLocaleString();
  document.getElementById('d-confirmed').textContent = d.confirmedOrders.toLocaleString();
  document.getElementById('d-cancelled').textContent = d.cancelledOrders.toLocaleString();
  document.getElementById('d-revenue').textContent   = fmt.money(d.totalRevenue ?? 0);
  document.getElementById('d-users').textContent     = d.totalUsers.toLocaleString();

  const cnt  = d.lowStockItems?.length ?? 0;
  document.getElementById('d-lowstock-count').textContent = cnt;

  const body = document.getElementById('lowStockBody');
  if (cnt === 0) {
    body.innerHTML = '<tr><td colspan="7" class="text-center text-muted py-4">저재고 상품 없음 🎉</td></tr>';
  } else {
    body.innerHTML = d.lowStockItems.map(i => `
      <tr>
        <td class="fw-semibold">${i.productName}</td>
        <td><code>${i.sku}</code></td>
        <td>${i.onHand}</td>
        <td class="text-warning">${i.reserved}</td>
        <td class="text-info">${i.allocated}</td>
        <td><span class="fw-bold text-danger">${i.available}</span></td>
        <td class="text-end">
          <button class="btn btn-success btn-sm" onclick="openReceiveModal(${i.productId}, '${i.productName}')">
            <i class="bi bi-plus-circle me-1"></i>입고
          </button>
        </td>
      </tr>`).join('');
  }
}

// ─── 재고 관리 : 상품 목록 ───────────────────────────────
async function loadProducts(page = 0) {
  productPage = page;
  const q    = document.getElementById('productSearch').value.trim();
  const path = `/api/products?page=${page}&size=10&sort=createdAt,desc${q ? '&search=' + encodeURIComponent(q) : ''}`;
  const body = document.getElementById('productTableBody');
  body.innerHTML = '<tr><td colspan="8" class="text-center py-4"><div class="spinner-border spinner-border-sm"></div></td></tr>';

  const d = await api('GET', path);
  if (!d) return;

  const rows = d.content ?? [];
  if (rows.length === 0) {
    body.innerHTML = '<tr><td colspan="8" class="text-center text-muted py-4">상품 없음</td></tr>';
  } else {
    body.innerHTML = rows.map(p => `
      <tr id="prow-${p.id}">
        <td class="fw-semibold">${p.name}</td>
        <td><code>${p.sku}</code></td>
        <td>${fmt.money(p.price)}</td>
        <td>${fmt.badge(p.status, {ACTIVE:'판매 중', DISCONTINUED:'판매 중단'})}</td>
        <td id="inv-${p.id}">
          <button class="btn btn-link btn-sm p-0 text-muted" onclick="loadInventoryInline(${p.id}, this)">재고 조회</button>
        </td>
        <td id="inv-reserved-${p.id}">-</td>
        <td id="inv-allocated-${p.id}">-</td>
        <td class="text-end">
          <button class="btn btn-success btn-sm me-1" onclick="openReceiveModal(${p.id}, '${p.name.replace(/'/g,"\\'")}')">
            <i class="bi bi-plus-circle"></i> 입고
          </button>
          <button class="btn btn-outline-secondary btn-sm" onclick="openHistoryModal(${p.id}, '${p.name.replace(/'/g,"\\'")}')">
            <i class="bi bi-clock-history"></i> 이력
          </button>
        </td>
      </tr>`).join('');
  }

  document.getElementById('productPager').innerHTML =
    pager(d.number, d.totalPages, 'loadProducts');
}

async function loadInventoryInline(productId, btn) {
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span>';

  const inv = await api('GET', `/api/inventory/${productId}`);
  if (!inv) { btn.disabled = false; btn.textContent = '재고 조회'; return; }

  document.getElementById(`inv-${productId}`).innerHTML = stockBar(inv.available, inv.onHand);
  document.getElementById(`inv-reserved-${productId}`).innerHTML   = `<span class="text-warning">${inv.reserved}</span>`;
  document.getElementById(`inv-allocated-${productId}`).innerHTML  = `<span class="text-info">${inv.allocated}</span>`;
}

// ─── 입고 처리 모달 ──────────────────────────────────────
const receiveModal = new bootstrap.Modal(document.getElementById('receiveModal'));

function openReceiveModal(productId, productName) {
  receiveProductId = productId;
  document.getElementById('receiveProductName').textContent = productName;
  document.getElementById('receiveQty').value = 1;
  receiveModal.show();
}

async function submitReceive() {
  const qty = parseInt(document.getElementById('receiveQty').value);
  if (!qty || qty < 1) { showToast('수량을 입력하세요', 'warning'); return; }

  const d = await api('POST', `/api/inventory/${receiveProductId}/receive`, { quantity: qty });
  if (!d) return;

  receiveModal.hide();
  showToast(`입고 완료 (가용재고: ${d.available}개)`);
  // 인라인 재고 갱신
  document.getElementById(`inv-${receiveProductId}`).innerHTML = stockBar(d.available, d.onHand);
  document.getElementById(`inv-reserved-${receiveProductId}`).innerHTML  = `<span class="text-warning">${d.reserved}</span>`;
  document.getElementById(`inv-allocated-${receiveProductId}`).innerHTML = `<span class="text-info">${d.allocated}</span>`;
  // 대시보드 저재고 갱신
  loadDashboard();
}

// ─── 재고 이력 모달 ──────────────────────────────────────
const historyModal = new bootstrap.Modal(document.getElementById('historyModal'));

async function openHistoryModal(productId, productName) {
  document.getElementById('historyProductName').textContent = productName;
  document.getElementById('historyBody').innerHTML =
    '<tr><td colspan="6" class="text-center py-3"><div class="spinner-border spinner-border-sm"></div></td></tr>';
  historyModal.show();

  const list = await api('GET', `/api/inventory/${productId}/transactions`);
  if (!list) return;

  if (list.length === 0) {
    document.getElementById('historyBody').innerHTML =
      '<tr><td colspan="6" class="text-center text-muted py-3">이력 없음</td></tr>';
    return;
  }

  document.getElementById('historyBody').innerHTML = list.map(tx => {
    const isInbound = ['RECEIVE','RELEASE_RESERVATION','RELEASE_ALLOCATION'].includes(tx.type);
    return `<tr>
      <td><span class="badge bg-${isInbound ? 'success' : 'primary'}">${txTypeLabel[tx.type] ?? tx.type}</span></td>
      <td class="text-end fw-semibold ${isInbound ? 'text-success' : 'text-primary'}">${isInbound ? '+' : '-'}${tx.quantity}</td>
      <td class="text-end">${tx.snapshotOnHand}</td>
      <td class="text-end">${tx.snapshotReserved}</td>
      <td class="text-end">${tx.snapshotAllocated}</td>
      <td class="small text-muted">${fmt.date(tx.createdAt)}</td>
    </tr>`;
  }).join('');
}

// ─── 일괄 입고 ───────────────────────────────────────────
let bulkRowId = 0;

function addBulkRow() {
  const id = ++bulkRowId;
  const tr = document.createElement('tr');
  tr.id = `bulk-${id}`;
  tr.className = 'bulk-row';
  tr.innerHTML = `
    <td><input type="number" class="form-control form-control-sm" placeholder="상품 ID" min="1"></td>
    <td><input type="number" class="form-control form-control-sm" placeholder="수량" min="1" value="1"></td>
    <td><button class="btn btn-outline-danger btn-sm" onclick="document.getElementById('bulk-${id}').remove()"><i class="bi bi-trash"></i></button></td>`;
  document.getElementById('bulkBody').appendChild(tr);
}

async function submitBulk() {
  const rows = document.querySelectorAll('#bulkBody tr.bulk-row');
  if (rows.length === 0) { showToast('행을 추가하세요', 'warning'); return; }

  let success = 0, fail = 0;
  for (const row of rows) {
    const [pidInput, qtyInput] = row.querySelectorAll('input');
    const pid = parseInt(pidInput.value);
    const qty = parseInt(qtyInput.value);
    if (!pid || !qty || qty < 1) { fail++; continue; }

    const d = await api('POST', `/api/inventory/${pid}/receive`, { quantity: qty });
    if (d) success++; else fail++;
  }

  showToast(`입고 완료 ${success}건${fail > 0 ? `, 실패 ${fail}건` : ''}`, fail > 0 ? 'warning' : 'success');
  if (success > 0) loadDashboard();
}

// ─── 주문 관리 ───────────────────────────────────────────
document.querySelectorAll('.order-filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.order-filter-btn').forEach(b => {
      b.className = b.dataset.status === ''
        ? 'btn btn-outline-dark btn-sm order-filter-btn'
        : `btn btn-outline-${statusColor(b.dataset.status)} btn-sm order-filter-btn`;
    });
    btn.className = btn.dataset.status === ''
      ? 'btn btn-dark btn-sm order-filter-btn active'
      : `btn btn-${statusColor(btn.dataset.status)} btn-sm order-filter-btn active`;
    ordersStatus = btn.dataset.status;
    loadOrders(0, ordersStatus);
  });
});

function statusColor(s) {
  return { PENDING:'warning', CONFIRMED:'success', CANCELLED:'secondary' }[s] ?? 'dark';
}

async function loadOrders(page = 0, status = '') {
  ordersPage   = page;
  ordersStatus = status;
  const qs  = `page=${page}&size=15&sort=createdAt,desc${status ? '&status=' + status : ''}`;
  const body = document.getElementById('ordersBody');
  body.innerHTML = '<tr><td colspan="6" class="text-center py-4"><div class="spinner-border spinner-border-sm"></div></td></tr>';

  const d = await api('GET', `/api/admin/orders?${qs}`);
  if (!d) return;

  const rows = d.content ?? [];
  if (rows.length === 0) {
    body.innerHTML = '<tr><td colspan="6" class="text-center text-muted py-4">주문 없음</td></tr>';
  } else {
    body.innerHTML = rows.map(o => `
      <tr>
        <td><code>#${o.id}</code></td>
        <td>${o.userId}</td>
        <td>${fmt.badge(o.status, statusLabel)}</td>
        <td class="fw-semibold">${fmt.money(o.totalAmount)}</td>
        <td class="small text-muted">${fmt.date(o.createdAt)}</td>
        <td class="text-end">
          ${o.status === 'PENDING'
            ? `<button class="btn btn-outline-danger btn-sm" onclick="cancelOrder(${o.id})"><i class="bi bi-x-circle me-1"></i>취소</button>`
            : '<span class="text-muted small">-</span>'}
        </td>
      </tr>`).join('');
  }

  document.getElementById('ordersPager').innerHTML =
    pager(d.number, d.totalPages, `(p)=>loadOrders(p,'${status}')`);
  // inline function 대신 전역 호출로 처리
  document.getElementById('ordersPager').innerHTML =
    `<span class="text-muted small">${d.number + 1} / ${Math.max(1, d.totalPages)} 페이지</span>
     <div class="btn-group btn-group-sm">
       <button class="btn btn-outline-secondary" ${d.number === 0 ? 'disabled' : ''} onclick="loadOrders(${d.number-1},'${status}')"><i class="bi bi-chevron-left"></i></button>
       <button class="btn btn-outline-secondary" ${d.number >= d.totalPages-1 ? 'disabled' : ''} onclick="loadOrders(${d.number+1},'${status}')"><i class="bi bi-chevron-right"></i></button>
     </div>`;
}

async function cancelOrder(orderId) {
  if (!confirm(`주문 #${orderId}을 취소하시겠습니까?`)) return;
  const d = await api('POST', `/api/orders/${orderId}/cancel`);
  if (!d) return;
  showToast(`주문 #${orderId} 취소 완료`);
  loadOrders(ordersPage, ordersStatus);
}

// ─── 사용자 관리 ─────────────────────────────────────────
async function loadUsers(page = 0) {
  usersPage = page;
  const body = document.getElementById('usersBody');
  body.innerHTML = '<tr><td colspan="6" class="text-center py-4"><div class="spinner-border spinner-border-sm"></div></td></tr>';

  const d = await api('GET', `/api/admin/users?page=${page}&size=15&sort=createdAt,desc`);
  if (!d) return;

  const rows = d.content ?? [];
  if (rows.length === 0) {
    body.innerHTML = '<tr><td colspan="6" class="text-center text-muted py-4">사용자 없음</td></tr>';
  } else {
    body.innerHTML = rows.map(u => `
      <tr>
        <td class="text-muted small">${u.id}</td>
        <td class="fw-semibold">${u.username}</td>
        <td class="text-muted small">${u.email}</td>
        <td>${fmt.badge(u.role, {USER:'일반', ADMIN:'관리자'})}</td>
        <td class="small text-muted">${fmt.date(u.createdAt)}</td>
        <td class="text-end">
          <button class="btn btn-sm ${u.role === 'ADMIN' ? 'btn-outline-secondary' : 'btn-outline-dark'}"
                  onclick="changeRole(${u.id}, '${u.role}', this)">
            ${u.role === 'ADMIN' ? '<i class="bi bi-arrow-down-circle me-1"></i>USER 강등' : '<i class="bi bi-arrow-up-circle me-1"></i>ADMIN 승격'}
          </button>
        </td>
      </tr>`).join('');
  }

  document.getElementById('usersPager').innerHTML =
    `<span class="text-muted small">${d.number + 1} / ${Math.max(1, d.totalPages)} 페이지</span>
     <div class="btn-group btn-group-sm">
       <button class="btn btn-outline-secondary" ${d.number === 0 ? 'disabled' : ''} onclick="loadUsers(${d.number-1})"><i class="bi bi-chevron-left"></i></button>
       <button class="btn btn-outline-secondary" ${d.number >= d.totalPages-1 ? 'disabled' : ''} onclick="loadUsers(${d.number+1})"><i class="bi bi-chevron-right"></i></button>
     </div>`;
}

async function changeRole(userId, currentRole, btn) {
  const newRole = currentRole === 'ADMIN' ? 'USER' : 'ADMIN';
  if (!confirm(`사용자 #${userId}의 권한을 ${newRole}로 변경하시겠습니까?`)) return;
  btn.disabled = true;
  const d = await api('PATCH', `/api/admin/users/${userId}/role`, { role: newRole });
  if (!d) { btn.disabled = false; return; }
  showToast(`권한이 ${newRole}로 변경되었습니다`);
  loadUsers(usersPage);
}

// ─── 토스트 ──────────────────────────────────────────────
const toastEl   = document.getElementById('toast');
const toastInst = new bootstrap.Toast(toastEl, { delay: 3000 });

function showToast(msg, type = 'success') {
  toastEl.className = `toast align-items-center border-0 text-bg-${type}`;
  document.getElementById('toastMsg').textContent = msg;
  toastInst.show();
}

// ─── 초기 진입 ───────────────────────────────────────────
if (token) { showApp(); }
</script>
</body>
</html>
