<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>장바구니 - StockMall</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link href="/shop/js/common.css" rel="stylesheet">
  <style>
    .content-wrap { max-width:760px; margin:0 auto; padding:1.5rem 1rem; }
    .page-title { font-size:1.15rem; font-weight:800; margin-bottom:1.2rem; }
    .cart-item { background:#fff; border:1px solid var(--border); border-radius:4px; padding:1rem; margin-bottom:.6rem; display:flex; align-items:center; gap:1rem; }
    .item-thumb { width:72px; height:72px; border-radius:3px; background:#f5f5f5; overflow:hidden; flex-shrink:0; cursor:pointer; }
    .item-thumb img { width:100%; height:100%; object-fit:cover; }
    .item-thumb-empty { width:100%; height:100%; display:flex; align-items:center; justify-content:center; color:#ccc; font-size:1.4rem; }
    .item-name { font-size:.88rem; font-weight:600; margin-bottom:.2rem; cursor:pointer; }
    .item-name:hover { color:var(--primary); }
    .item-price { font-size:.82rem; color:#888; }
    .qty-ctrl { display:flex; align-items:center; gap:6px; }
    .qty-btn { width:26px; height:26px; border:1px solid #ddd; border-radius:2px; background:#fff; cursor:pointer; display:flex; align-items:center; justify-content:center; font-size:.9rem; }
    .qty-btn:hover { border-color:var(--primary); color:var(--primary); }
    .qty-val { min-width:28px; text-align:center; font-size:.88rem; font-weight:600; }
    .item-subtotal { font-weight:800; font-size:.95rem; color:var(--primary); white-space:nowrap; }
    .item-del { background:none; border:none; color:#ccc; cursor:pointer; font-size:1.1rem; padding:.2rem; }
    .item-del:hover { color:#e74c3c; }
    .unavail-badge { font-size:.7rem; color:#e65c00; font-weight:600; }
    .summary-box { background:#fff; border:1px solid var(--border); border-radius:4px; padding:1.2rem; margin-top:1rem; }
    .summary-row { display:flex; justify-content:space-between; font-size:.85rem; margin-bottom:.5rem; }
    .summary-total { display:flex; justify-content:space-between; font-size:1.05rem; font-weight:800; padding-top:.75rem; border-top:2px solid var(--border); margin-top:.5rem; }
    .summary-total span:last-child { color:var(--primary); }
    .empty-cart { text-align:center; padding:5rem 0; color:#bbb; }
    .empty-cart i { font-size:3.5rem; display:block; margin-bottom:1rem; }
  </style>
</head>
<body>

<header class="site-header">
  <div class="header-inner">
    <a class="logo" href="/shop/">Stock<em>Mall</em></a>
    <div class="header-actions ms-auto">
      <button class="hdr-btn" id="wishlistBtn"><i class="bi bi-heart"></i><span>찜</span></button>
      <button class="hdr-btn" id="cartBtn">
        <i class="bi bi-cart3"></i><span>장바구니</span>
        <span class="cart-badge" id="cartBadge">0</span>
      </button>
      <button class="hdr-btn d-none" id="myPageBtn"><i class="bi bi-person-lines-fill"></i><span>마이페이지</span></button>
      <button class="hdr-btn" id="loginOpenBtn"><i class="bi bi-person"></i><span>로그인</span></button>
      <div class="hdr-user d-none" id="userInfo">
        <i class="bi bi-person-check-fill"></i>
        <span id="userNameDisplay"></span>
        <button class="btn btn-link p-0 text-muted" style="font-size:.72rem" id="logoutBtn">로그아웃</button>
      </div>
    </div>
  </div>
</header>

<div class="content-wrap">
  <div class="page-title"><i class="bi bi-cart3 me-2"></i>장바구니</div>

  <div id="loadingArea" class="text-center py-5">
    <div class="spinner-border" style="color:var(--primary)"></div>
  </div>

  <div id="emptyCart" class="empty-cart" style="display:none">
    <i class="bi bi-cart3"></i>
    <p class="fw-semibold" style="font-size:.95rem;color:#999">장바구니가 비어있습니다</p>
    <a href="/shop/" class="btn btn-sm mt-2 fw-bold" style="background:var(--primary);color:#fff">쇼핑하러 가기</a>
  </div>

  <div id="cartArea" style="display:none">
    <div class="d-flex justify-content-between align-items-center mb-2">
      <span class="text-muted small" id="itemCountLabel"></span>
      <button class="btn btn-link btn-sm text-muted p-0" id="clearAllBtn"><i class="bi bi-trash me-1"></i>전체 삭제</button>
    </div>
    <div id="cartItems"></div>
    <div class="summary-box">
      <div class="summary-row"><span>상품 합계</span><span id="sumBase"></span></div>
      <div class="summary-row text-success"><span><i class="bi bi-truck me-1"></i>배송비</span><span>무료</span></div>
      <div class="summary-total"><span>총 결제 예상금액</span><span id="sumTotal"></span></div>
    </div>
    <div class="d-flex gap-2 mt-3">
      <a href="/shop/" class="btn btn-outline-secondary btn-sm fw-bold flex-grow-0 px-3">쇼핑 계속</a>
      <a href="/shop/checkout.html" class="btn btn-sm fw-bold flex-grow-1" style="background:var(--primary);color:#fff">
        <i class="bi bi-bag-check me-1"></i>주문하기
      </a>
    </div>
  </div>
</div>

<div id="toast-container"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/shop/js/common.js"></script>
<script>
'use strict';
let cartItems = [];

document.addEventListener('DOMContentLoaded', async () => {
  if (!requireAuth()) return;
  initHeader();
  await loadCart();
});

async function loadCart() {
  document.getElementById('loadingArea').style.display = '';
  document.getElementById('cartArea').style.display    = 'none';
  document.getElementById('emptyCart').style.display   = 'none';

  const json = await api('GET', '/api/cart');
  document.getElementById('loadingArea').style.display = 'none';

  if (!json.success) { showToast('장바구니를 불러오지 못했습니다', 'danger'); return; }
  cartItems = json.data?.items ?? [];

  if (!cartItems.length) { document.getElementById('emptyCart').style.display = ''; return; }

  document.getElementById('cartArea').style.display = '';
  document.getElementById('itemCountLabel').textContent = `총 ${cartItems.length}개 상품`;
  renderCartItems();
  renderSummary();
  loadCartCount();
}

function renderCartItems() {
  document.getElementById('cartItems').innerHTML = cartItems.map(item => {
    const price   = Number(item.unitPrice ?? 0);
    const subtotal= price * item.quantity;
    const unavail = item.isAvailable === false;
    const thumb   = `<div class="item-thumb-empty"><i class="bi bi-box-seam"></i></div>`;
    return `<div class="cart-item" data-pid="${item.productId}">
      <div class="item-thumb" data-action="go-product" data-id="${item.productId}">${thumb}</div>
      <div class="flex-grow-1">
        <div class="item-name" data-action="go-product" data-id="${item.productId}">${esc(item.productName)}</div>
        <div class="item-price">${fmtMoney(price)}원</div>
        ${unavail ? `<div class="unavail-badge"><i class="bi bi-exclamation-circle me-1"></i>현재 구매 불가</div>` : ''}
      </div>
      <div class="qty-ctrl">
        <button class="qty-btn" data-action="qty-minus" data-pid="${item.productId}"><i class="bi bi-dash"></i></button>
        <span class="qty-val">${item.quantity}</span>
        <button class="qty-btn" data-action="qty-plus"  data-pid="${item.productId}"><i class="bi bi-plus"></i></button>
      </div>
      <div class="item-subtotal">${fmtMoney(subtotal)}원</div>
      <button class="item-del" data-action="remove" data-pid="${item.productId}"><i class="bi bi-x-lg"></i></button>
    </div>`;
  }).join('');
}

function renderSummary() {
  const total = cartItems.reduce((s, i) => s + Number(i.unitPrice ?? 0) * i.quantity, 0);
  document.getElementById('sumBase').textContent  = `${fmtMoney(total)}원`;
  document.getElementById('sumTotal').textContent = `${fmtMoney(total)}원`;
}

document.getElementById('cartItems').addEventListener('click', async e => {
  const goBtn  = e.target.closest('[data-action="go-product"]');
  if (goBtn) { location.href = `/shop/product.html?id=${goBtn.dataset.id}`; return; }

  const remBtn = e.target.closest('[data-action="remove"]');
  if (remBtn) {
    const json = await api('DELETE', `/api/cart/items/${remBtn.dataset.pid}`);
    if (!json.success) { showToast('삭제 실패', 'danger'); return; }
    await loadCart();
    return;
  }

  const minusBtn = e.target.closest('[data-action="qty-minus"]');
  if (minusBtn) {
    const item = cartItems.find(i => i.productId === +minusBtn.dataset.pid);
    if (!item) return;
    if (item.quantity <= 1) { const json = await api('DELETE', `/api/cart/items/${item.productId}`); if (json.success) await loadCart(); return; }
    await api('POST', '/api/cart/items', { productId: item.productId, quantity: item.quantity - 1 });
    await loadCart(); return;
  }

  const plusBtn = e.target.closest('[data-action="qty-plus"]');
  if (plusBtn) {
    const item = cartItems.find(i => i.productId === +plusBtn.dataset.pid);
    if (!item) return;
    await api('POST', '/api/cart/items', { productId: item.productId, quantity: item.quantity + 1 });
    await loadCart();
  }
});

document.getElementById('clearAllBtn').addEventListener('click', async () => {
  if (!confirm('장바구니를 비우시겠습니까?')) return;
  const json = await api('DELETE', '/api/cart');
  if (!json.success) { showToast('실패', 'danger'); return; }
  await loadCart();
});
</script>
</body>
</html>
