<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>주문하기 - StockMall</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link href="/shop/js/common.css" rel="stylesheet">
  <style>
    .content-wrap { max-width:840px; margin:0 auto; padding:1.5rem 1rem; }
    .page-title { font-size:1.15rem; font-weight:800; margin-bottom:1.5rem; }
    .section-card { background:#fff; border:1px solid var(--border); border-radius:4px; padding:1.2rem; margin-bottom:1rem; }
    .section-title { font-size:.9rem; font-weight:800; margin-bottom:.9rem; display:flex; align-items:center; justify-content:space-between; }
    .section-title .btn-link { font-size:.78rem; font-weight:600; color:var(--primary); text-decoration:none; }
    /* 배송지 */
    .addr-card { border:1px solid var(--border); border-radius:4px; padding:.85rem 1rem; cursor:pointer; transition:border-color .15s; margin-bottom:.5rem; position:relative; }
    .addr-card:hover { border-color:#aaa; }
    .addr-card.selected { border-color:var(--primary); background:#fff8f6; }
    .addr-card input[type=radio] { position:absolute; opacity:0; pointer-events:none; }
    .addr-alias { font-weight:700; font-size:.88rem; }
    .addr-default-badge { font-size:.7rem; background:var(--primary); color:#fff; border-radius:3px; padding:1px 6px; margin-left:6px; }
    .addr-detail { font-size:.8rem; color:#555; margin-top:.3rem; line-height:1.5; }
    /* 주문 상품 */
    .order-item-row { display:flex; justify-content:space-between; align-items:center; padding:.5rem 0; border-bottom:1px solid #f5f5f5; font-size:.85rem; }
    .order-item-row:last-child { border-bottom:none; }
    /* 쿠폰/포인트 */
    .coupon-preview { background:#fff3e0; border:1px solid #ffcc80; border-radius:4px; padding:.5rem .85rem; font-size:.82rem; color:#e65c00; margin-top:.4rem; display:none; }
    .point-info { font-size:.78rem; color:#888; margin-bottom:.4rem; }
    /* 최종 금액 */
    .price-row { display:flex; justify-content:space-between; font-size:.85rem; padding:.35rem 0; }
    .price-row.total { font-weight:800; font-size:1.05rem; border-top:2px solid var(--border); padding-top:.75rem; margin-top:.35rem; }
    .price-row.total span:last-child { color:var(--primary); }
    /* 배송지 추가 폼 */
    .add-addr-form { background:var(--surface); border-radius:4px; padding:1rem; margin-top:.75rem; display:none; }
  </style>
</head>
<body>

<header class="site-header">
  <div class="header-inner">
    <a class="logo" href="/shop/">Stock<em>Mall</em></a>
    <div class="header-actions ms-auto">
      <button class="hdr-btn" id="cartBtn">
        <i class="bi bi-cart3"></i><span>장바구니</span>
        <span class="cart-badge" id="cartBadge">0</span>
      </button>
      <button class="hdr-btn d-none" id="myPageBtn"><i class="bi bi-person-lines-fill"></i><span>마이페이지</span></button>
      <button class="hdr-btn" id="loginOpenBtn"><i class="bi bi-person"></i><span>로그인</span></button>
      <div class="hdr-user d-none" id="userInfo">
        <i class="bi bi-person-check-fill"></i>
        <span id="userNameDisplay"></span>
        <button class="btn btn-link p-0 text-muted" style="font-size:.72rem" id="logoutBtn">로그아웃</button>
      </div>
    </div>
  </div>
</header>

<div class="content-wrap">
  <div class="page-title"><i class="bi bi-bag-check me-2"></i>주문하기</div>

  <div id="loadingArea" class="text-center py-5">
    <div class="spinner-border" style="color:var(--primary)"></div>
  </div>
  <div id="checkoutArea" style="display:none">
    <div class="row g-3">
      <!-- 왼쪽 -->
      <div class="col-md-7">
        <!-- 주문 상품 -->
        <div class="section-card">
          <div class="section-title">주문 상품</div>
          <div id="orderItems"></div>
        </div>

        <!-- 배송지 -->
        <div class="section-card">
          <div class="section-title">배송지
            <button class="btn-link" id="toggleAddrFormBtn">+ 새 배송지</button>
          </div>
          <div id="addrList"></div>
          <div id="noAddrMsg" class="text-muted small d-none">등록된 배송지가 없습니다. 새 배송지를 추가하세요.</div>

          <!-- 배송지 추가 폼 -->
          <div class="add-addr-form" id="addAddrForm">
            <div class="row g-2">
              <div class="col-6"><input id="addrAlias"     class="form-control form-control-sm" placeholder="별칭 (예: 집)"></div>
              <div class="col-6"><input id="addrRecipient" class="form-control form-control-sm" placeholder="수령인"></div>
              <div class="col-6"><input id="addrPhone"     class="form-control form-control-sm" placeholder="전화번호 (숫자만)"></div>
              <div class="col-6"><input id="addrZip"       class="form-control form-control-sm" placeholder="우편번호"></div>
              <div class="col-12"><input id="addrAddr1"    class="form-control form-control-sm" placeholder="주소"></div>
              <div class="col-12"><input id="addrAddr2"    class="form-control form-control-sm" placeholder="상세주소 (선택)"></div>
            </div>
            <div id="addrError" class="alert alert-danger py-2 small mt-2 d-none"></div>
            <div class="d-flex gap-2 mt-2">
              <button class="btn btn-sm fw-bold" style="background:var(--primary);color:#fff" id="saveAddrBtn">저장</button>
              <button class="btn btn-sm btn-outline-secondary" id="cancelAddrBtn">취소</button>
            </div>
          </div>
        </div>

        <!-- 쿠폰 -->
        <div class="section-card">
          <div class="section-title">쿠폰</div>
          <select id="couponSelect" class="form-select form-select-sm">
            <option value="">쿠폰 사용 안함</option>
          </select>
          <div id="couponPreview" class="coupon-preview"></div>
        </div>

        <!-- 포인트 -->
        <div class="section-card">
          <div class="section-title">포인트</div>
          <div class="point-info">보유 포인트: <strong id="pointBalance">0</strong> P</div>
          <div class="d-flex gap-2 align-items-center">
            <input type="number" id="usePoints" class="form-control form-control-sm" placeholder="0" min="0" style="width:130px">
            <button class="btn btn-sm btn-outline-secondary" id="useAllPointsBtn">전액 사용</button>
            <button class="btn btn-sm btn-outline-secondary" id="clearPointsBtn">초기화</button>
          </div>
        </div>
      </div>

      <!-- 오른쪽: 결제 요약 -->
      <div class="col-md-5">
        <div class="section-card" style="position:sticky;top:80px">
          <div class="section-title">결제 금액</div>
          <div class="price-row"><span>상품 금액</span><span id="priceBase">0원</span></div>
          <div class="price-row text-danger" id="discountRow" style="display:none"><span>쿠폰 할인</span><span id="priceDiscount">0원</span></div>
          <div class="price-row text-danger" id="pointRow"    style="display:none"><span>포인트 사용</span><span id="pricePoint">0원</span></div>
          <div class="price-row text-success"><span>배송비</span><span>무료</span></div>
          <div class="price-row total"><span>최종 결제</span><span id="priceFinal">0원</span></div>
          <div id="placeError" class="alert alert-danger py-2 small mt-2 d-none"></div>
          <button class="btn-primary-custom w-100 mt-3" id="placeOrderBtn">
            <i class="bi bi-lock-fill me-1"></i>결제하기
          </button>
        </div>
      </div>
    </div>
  </div>
</div>

<div id="toast-container"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/shop/js/common.js"></script>
<script>
'use strict';
let cartData = null, addresses = [], selectedAddrId = null, discount = 0, pointBal = 0;

document.addEventListener('DOMContentLoaded', async () => {
  if (!requireAuth()) return;
  initHeader();
  await loadAll();
});

async function loadAll() {
  const [cartJson, addrJson, couponJson, pointJson] = await Promise.all([
    api('GET', '/api/cart'),
    api('GET', '/api/delivery-addresses'),
    api('GET', '/api/coupons/my'),
    api('GET', '/api/points/balance'),
  ]);
  document.getElementById('loadingArea').style.display = 'none';

  if (!cartJson.success || !(cartJson.data?.items?.length)) {
    document.getElementById('loadingArea').innerHTML = '<div class="text-center py-5"><p class="text-muted">장바구니가 비어있습니다.</p><a href="/shop/" class="btn btn-sm mt-2 fw-bold" style="background:var(--primary);color:#fff">쇼핑하러 가기</a></div>';
    document.getElementById('loadingArea').style.display = '';
    return;
  }

  cartData  = cartJson.data;
  addresses = addrJson.success ? (Array.isArray(addrJson.data) ? addrJson.data : []) : [];
  pointBal  = pointJson.success ? (pointJson.data?.balance ?? 0) : 0;

  // 주문 상품
  document.getElementById('orderItems').innerHTML = (cartData.items ?? []).map(i =>
    `<div class="order-item-row"><span>${esc(i.productName)} × ${i.quantity}</span><span class="fw-bold">${fmtMoney(Number(i.unitPrice??0)*i.quantity)}원</span></div>`
  ).join('');

  // 배송지
  renderAddrList();

  // 쿠폰
  const coupons = couponJson.success ? (Array.isArray(couponJson.data) ? couponJson.data : []) : [];
  const sel = document.getElementById('couponSelect');
  coupons.filter(c => c.isUsable).forEach(c => {
    const disc = c.discountType === 'PERCENTAGE' ? `${c.discountValue}%` : `${fmtMoney(c.discountValue)}원`;
    const opt = document.createElement('option');
    opt.value = c.code; opt.textContent = `[${disc}] ${c.name}`;
    sel.appendChild(opt);
  });

  // 포인트
  document.getElementById('pointBalance').textContent = fmtMoney(pointBal);
  document.getElementById('useAllPointsBtn').addEventListener('click', () => {
    const base = calcBase();
    document.getElementById('usePoints').value = Math.min(pointBal, base);
    updateSummary();
  });
  document.getElementById('clearPointsBtn').addEventListener('click', () => {
    document.getElementById('usePoints').value = ''; updateSummary();
  });
  document.getElementById('usePoints').addEventListener('input', updateSummary);

  document.getElementById('checkoutArea').style.display = '';
  updateSummary();
}

function renderAddrList() {
  const el = document.getElementById('addrList');
  if (!addresses.length) { el.innerHTML = ''; document.getElementById('noAddrMsg').classList.remove('d-none'); return; }
  document.getElementById('noAddrMsg').classList.add('d-none');
  // 기본 배송지 우선 선택
  if (!selectedAddrId) {
    const def = addresses.find(a => a.isDefault) ?? addresses[0];
    if (def) selectedAddrId = def.id;
  }
  el.innerHTML = addresses.map(a => `
    <div class="addr-card ${a.id === selectedAddrId ? 'selected' : ''}" data-addr-id="${a.id}">
      <div class="addr-alias">${esc(a.alias)} ${a.isDefault ? '<span class="addr-default-badge">기본</span>' : ''}</div>
      <div class="addr-detail">${esc(a.recipient)} · ${esc(a.phone)}<br>${esc(a.address1)} ${esc(a.address2??'')}</div>
    </div>`).join('');
}

document.getElementById('addrList').addEventListener('click', e => {
  const card = e.target.closest('.addr-card[data-addr-id]');
  if (!card) return;
  selectedAddrId = +card.dataset.addrId;
  renderAddrList();
});

// 배송지 추가 폼 토글
document.getElementById('toggleAddrFormBtn').addEventListener('click', () => {
  const form = document.getElementById('addAddrForm');
  form.style.display = form.style.display === 'none' ? '' : 'none';
});
document.getElementById('cancelAddrBtn').addEventListener('click', () => {
  document.getElementById('addAddrForm').style.display = 'none';
});
document.getElementById('saveAddrBtn').addEventListener('click', async () => {
  const body = {
    alias:     document.getElementById('addrAlias').value.trim(),
    recipient: document.getElementById('addrRecipient').value.trim(),
    phone:     document.getElementById('addrPhone').value.trim().replace(/\D/g,''),
    zipCode:   document.getElementById('addrZip').value.trim(),
    address1:  document.getElementById('addrAddr1').value.trim(),
    address2:  document.getElementById('addrAddr2').value.trim() || null,
  };
  const errEl = document.getElementById('addrError');
  if (!body.alias||!body.recipient||!body.phone||!body.zipCode||!body.address1) {
    errEl.textContent='상세주소 외 모든 항목을 입력하세요'; errEl.classList.remove('d-none'); return;
  }
  errEl.classList.add('d-none');
  const btn = document.getElementById('saveAddrBtn');
  setLoading(btn, true);
  const json = await api('POST', '/api/delivery-addresses', body);
  setLoading(btn, false);
  if (!json.success) { errEl.textContent = json.message||'저장 실패'; errEl.classList.remove('d-none'); return; }
  // 폼 초기화 후 목록 갱신
  ['addrAlias','addrRecipient','addrPhone','addrZip','addrAddr1','addrAddr2'].forEach(id => document.getElementById(id).value='');
  document.getElementById('addAddrForm').style.display = 'none';
  const addrJson = await api('GET', '/api/delivery-addresses');
  addresses = addrJson.success ? (Array.isArray(addrJson.data) ? addrJson.data : []) : [];
  selectedAddrId = json.data.id; // 새로 추가한 배송지 선택
  renderAddrList();
  showToast('배송지가 저장되었습니다', 'success');
});

// 쿠폰 변경
document.getElementById('couponSelect').addEventListener('change', async () => {
  const code = document.getElementById('couponSelect').value;
  const prev = document.getElementById('couponPreview');
  discount   = 0;
  if (!code) { prev.style.display='none'; updateSummary(); return; }
  const base = calcBase();
  const json = await api('POST', '/api/coupons/validate', { couponCode: code, orderAmount: base });
  if (json.success) {
    discount = Number(json.data.discountAmount ?? 0);
    prev.textContent = `${esc(json.data.couponName)}: -${fmtMoney(discount)}원 할인`;
    prev.style.display = '';
  } else {
    prev.textContent = json.message || '쿠폰 조회 실패';
    prev.style.display = '';
  }
  updateSummary();
});

function calcBase() {
  return (cartData?.items ?? []).reduce((s, i) => s + Number(i.unitPrice ?? 0) * i.quantity, 0);
}
function updateSummary() {
  const base      = calcBase();
  const usePoints = Math.min(Math.max(0, +document.getElementById('usePoints').value || 0), pointBal, base);
  const final     = Math.max(0, base - discount - usePoints);
  document.getElementById('priceBase').textContent     = `${fmtMoney(base)}원`;
  document.getElementById('priceDiscount').textContent = `-${fmtMoney(discount)}원`;
  document.getElementById('pricePoint').textContent    = `-${fmtMoney(usePoints)}P`;
  document.getElementById('priceFinal').textContent    = `${fmtMoney(final)}원`;
  document.getElementById('discountRow').style.display = discount > 0    ? '' : 'none';
  document.getElementById('pointRow').style.display    = usePoints > 0   ? '' : 'none';
}

// 주문 생성
document.getElementById('placeOrderBtn').addEventListener('click', async () => {
  const errEl = document.getElementById('placeError');
  errEl.classList.add('d-none');
  const usePoints = Math.min(Math.max(0, +document.getElementById('usePoints').value || 0), pointBal);
  const couponCode = document.getElementById('couponSelect').value || null;
  const body = {
    idempotencyKey:    `order-${Date.now()}-${Math.random().toString(36).slice(2,8)}`,
    couponCode:        couponCode || undefined,
    usePoints:         usePoints  || undefined,
    deliveryAddressId: selectedAddrId || undefined,
  };
  const btn = document.getElementById('placeOrderBtn');
  setLoading(btn, true, '주문 생성 중...');
  const json = await api('POST', '/api/cart/checkout', body);
  setLoading(btn, false);
  if (!json.success) { errEl.textContent = json.message || '주문 생성 실패'; errEl.classList.remove('d-none'); return; }
  const order = json.data;
  // 결제 페이지로 이동 (orderId, amount 전달)
  sessionStorage.setItem('pendingOrder', JSON.stringify({ orderId: order.id, amount: order.totalAmount }));
  location.href = '/shop/payment.html';
});
</script>
</body>
</html>
