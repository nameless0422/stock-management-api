<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>주문 상세 - StockMall</title>
  <link href="/shop/js/bootstrap.min.css" rel="stylesheet">
  <link href="/shop/js/bootstrap-icons.min.css" rel="stylesheet">
  <link href="/shop/js/common.css" rel="stylesheet">
  <style>
    .content-wrap { max-width:720px; margin:0 auto; padding:1.5rem 1rem; }
    .page-title { font-size:1.1rem; font-weight:800; margin-bottom:1.5rem; }
    .section-card { background:#fff; border:1px solid var(--border); border-radius:4px; padding:1.2rem; margin-bottom:.8rem; }
    .section-title { font-size:.88rem; font-weight:800; color:#333; margin-bottom:.8rem; padding-bottom:.5rem; border-bottom:1px solid var(--border); }
    .info-row { display:flex; justify-content:space-between; font-size:.84rem; padding:.3rem 0; }
    .info-row .label { color:#888; }
    .info-row .value { font-weight:500; text-align:right; }
    .order-item-row { display:flex; justify-content:space-between; align-items:center; padding:.5rem 0; border-bottom:1px solid #f5f5f5; font-size:.85rem; }
    .order-item-row:last-child { border-bottom:none; }
    .item-name { flex:1; cursor:pointer; }
    .item-name:hover { color:var(--primary); }
    .total-row { display:flex; justify-content:space-between; font-size:1rem; font-weight:800; padding-top:.75rem; border-top:2px solid var(--border); margin-top:.5rem; }
    .total-row span:last-child { color:var(--primary); }
    /* 배송 타임라인 */
    .timeline { padding:0; list-style:none; }
    .timeline li { position:relative; padding-left:1.5rem; padding-bottom:.75rem; font-size:.83rem; }
    .timeline li::before { content:''; position:absolute; left:4px; top:6px; width:8px; height:8px; border-radius:50%; background:#ddd; }
    .timeline li.done::before { background:var(--primary); }
    .timeline li.active::before { background:var(--primary); box-shadow:0 0 0 3px rgba(255,71,10,.2); }
    .timeline li::after { content:''; position:absolute; left:7px; top:14px; width:2px; height:calc(100% - 10px); background:#eee; }
    .timeline li:last-child::after { display:none; }
    .timeline .time { font-size:.72rem; color:#aaa; margin-top:2px; }
  </style>
</head>
<body>

<header class="site-header">
  <div class="header-inner">
    <a class="logo" href="/shop/">Stock<em>Mall</em></a>
    <div class="header-actions ms-auto">
      <button class="hdr-btn" id="cartBtn">
        <i class="bi bi-cart3"></i><span>장바구니</span>
        <span class="cart-badge" id="cartBadge">0</span>
      </button>
      <button class="hdr-btn d-none" id="myPageBtn"><i class="bi bi-person-lines-fill"></i><span>마이페이지</span></button>
      <button class="hdr-btn" id="loginOpenBtn"><i class="bi bi-person"></i><span>로그인</span></button>
      <div class="hdr-user d-none" id="userInfo">
        <i class="bi bi-person-check-fill"></i>
        <span id="userNameDisplay"></span>
        <button class="btn btn-link p-0 text-muted" style="font-size:.72rem" id="logoutBtn">로그아웃</button>
      </div>
    </div>
  </div>
</header>

<div class="content-wrap">
  <div class="d-flex align-items-center gap-2 mb-3">
    <a href="/shop/mypage.html" class="btn btn-link p-0 text-muted" style="font-size:.82rem"><i class="bi bi-chevron-left"></i> 주문내역</a>
  </div>
  <div class="page-title">주문 상세</div>

  <div id="loadingArea" class="text-center py-5">
    <div class="spinner-border" style="color:var(--primary)"></div>
  </div>

  <div id="detailArea" style="display:none">
    <!-- 주문 정보 -->
    <div class="section-card">
      <div class="section-title">주문 정보</div>
      <div id="orderInfoRows"></div>
    </div>

    <!-- 주문 상품 -->
    <div class="section-card">
      <div class="section-title">주문 상품</div>
      <div id="orderItemsRows"></div>
      <div id="orderPriceRows" class="mt-2"></div>
    </div>

    <!-- 결제 정보 -->
    <div class="section-card" id="paymentSection" style="display:none">
      <div class="section-title">결제 정보</div>
      <div id="paymentRows"></div>
    </div>

    <!-- 배송 정보 -->
    <div class="section-card" id="shipmentSection" style="display:none">
      <div class="section-title">배송 정보</div>
      <div id="shipmentRows"></div>
      <ul class="timeline mt-3" id="shipmentTimeline"></ul>
    </div>

    <!-- 액션 버튼 -->
    <div class="d-flex gap-2 flex-wrap" id="actionBtns"></div>
  </div>
</div>

<div id="toast-container"></div>
<script src="/shop/js/bootstrap.bundle.min.js"></script>
<script src="/shop/js/common.js"></script>
<script>
'use strict';
const orderId = +new URLSearchParams(location.search).get('id');

document.addEventListener('DOMContentLoaded', async () => {
  if (!requireAuth()) return;
  initHeader();
  if (!orderId) { location.href='/shop/mypage.html'; return; }
  await loadOrderDetail();
});

async function loadOrderDetail() {
  const json = await api('GET', `/api/orders/${orderId}/detail`);
  document.getElementById('loadingArea').style.display = 'none';
  if (!json.success) {
    document.getElementById('loadingArea').innerHTML = `<div class="alert alert-danger">${esc(json.message||'불러오기 실패')}</div>`;
    document.getElementById('loadingArea').style.display = '';
    return;
  }
  const { order, payment, shipment } = json.data;
  document.title = `주문 #${order.id} - StockMall`;

  // 주문 정보
  document.getElementById('orderInfoRows').innerHTML = `
    <div class="info-row"><span class="label">주문 번호</span><span class="value">#${order.id}</span></div>
    <div class="info-row"><span class="label">주문 일시</span><span class="value">${fmtDate(order.createdAt)}</span></div>
    <div class="info-row"><span class="label">상태</span><span class="value"><span class="status-badge badge-${order.status}">${orderStatusLabel(order.status)}</span></span></div>`;

  // 주문 상품
  document.getElementById('orderItemsRows').innerHTML = (order.items ?? []).map(i => `
    <div class="order-item-row">
      <span class="item-name" data-pid="${i.productId}">${esc(i.productName)} <span class="text-muted">× ${i.quantity}</span></span>
      <span class="fw-bold">${fmtMoney(i.subtotal)}원</span>
    </div>`).join('');

  document.getElementById('orderItemsRows').addEventListener('click', e => {
    const el = e.target.closest('.item-name[data-pid]');
    if (el) location.href = `/shop/product.html?id=${el.dataset.pid}`;
  });

  const rows = [];
  if (order.discountAmount > 0)
    rows.push(`<div class="info-row"><span class="label text-danger">쿠폰 할인</span><span class="value text-danger">-${fmtMoney(order.discountAmount)}원</span></div>`);
  if (order.usedPoints > 0)
    rows.push(`<div class="info-row"><span class="label text-danger">포인트 사용</span><span class="value text-danger">-${fmtMoney(order.usedPoints)}P</span></div>`);
  rows.push(`<div class="total-row"><span>총 결제 금액</span><span>${fmtMoney(order.totalAmount)}원</span></div>`);
  document.getElementById('orderPriceRows').innerHTML = rows.join('');

  // 결제 정보
  if (payment) {
    const payLabel = { PENDING:'결제대기', DONE:'결제완료', FAILED:'결제실패', CANCELLED:'취소됨' }[payment.status] ?? payment.status;
    document.getElementById('paymentSection').style.display = '';
    document.getElementById('paymentRows').innerHTML = `
      <div class="info-row"><span class="label">상태</span><span class="value"><span class="status-badge badge-${payment.status}">${payLabel}</span></span></div>
      <div class="info-row"><span class="label">결제 금액</span><span class="value">${fmtMoney(payment.amount)}원</span></div>
      ${payment.method ? `<div class="info-row"><span class="label">결제 수단</span><span class="value">${esc(payment.method)}</span></div>` : ''}
      ${payment.approvedAt ? `<div class="info-row"><span class="label">승인 일시</span><span class="value">${fmtDateTime(payment.approvedAt)}</span></div>` : ''}
      ${payment.failureMessage ? `<div class="info-row"><span class="label">실패 사유</span><span class="value text-danger">${esc(payment.failureMessage)}</span></div>` : ''}`;
  }

  // 배송 정보
  if (shipment) {
    document.getElementById('shipmentSection').style.display = '';
    const infoRows = [];
    if (shipment.carrier)        infoRows.push(`<div class="info-row"><span class="label">택배사</span><span class="value">${esc(shipment.carrier)}</span></div>`);
    if (shipment.trackingNumber) infoRows.push(`<div class="info-row"><span class="label">운송장 번호</span><span class="value">${esc(shipment.trackingNumber)}</span></div>`);
    document.getElementById('shipmentRows').innerHTML = infoRows.join('') ||
      `<div class="info-row"><span class="label">상태</span><span class="value"><span class="status-badge badge-${shipment.status}">${shipmentStatusLabel(shipment.status)}</span></span></div>`;

    const steps = [
      { status:'PREPARING', label:'배송 준비중',  time: shipment.createdAt },
      { status:'SHIPPED',   label:'배송 출발',    time: shipment.shippedAt },
      { status:'DELIVERED', label:'배송 완료',    time: shipment.deliveredAt },
    ];
    const currentIdx = steps.findIndex(s => s.status === shipment.status);
    document.getElementById('shipmentTimeline').innerHTML = steps.map((s, i) => {
      const isDone   = i < currentIdx;
      const isActive = i === currentIdx;
      return `<li class="${isDone?'done':''} ${isActive?'active':''}">
        <strong>${s.label}</strong>
        ${s.time ? `<div class="time">${fmtDate(s.time)}</div>` : ''}
      </li>`;
    }).join('');
  }

  // 액션 버튼 (결제 없거나 결제 실패 시 결제하기 노출, PENDING 상태면 취소 가능)
  const btns = [];
  const needsPay = order.status === 'PENDING' && (!payment || payment.status === 'FAILED');
  if (needsPay) {
    btns.push(`<button class="btn-primary-custom" id="payBtn"><i class="bi bi-credit-card me-1"></i>결제하기</button>`);
  }
  if (order.status === 'PENDING') {
    btns.push(`<button class="btn btn-outline-danger btn-sm fw-bold" id="cancelBtn">주문 취소</button>`);
  }
  document.getElementById('actionBtns').innerHTML = btns.join('');

  document.getElementById('payBtn')?.addEventListener('click', async () => {
    const btn = document.getElementById('payBtn');
    setLoading(btn, true);
    const j = await api('GET', `/api/payments/order/${order.id}`);
    setLoading(btn, false);
    const amount = j.success && j.data ? j.data.amount : order.totalAmount;
    sessionStorage.setItem('pendingOrder', JSON.stringify({ orderId: order.id, amount }));
    location.href = '/shop/payment.html';
  });

  document.getElementById('cancelBtn')?.addEventListener('click', async () => {
    if (!confirm('주문을 취소하시겠습니까?')) return;
    const btn = document.getElementById('cancelBtn');
    setLoading(btn, true, '취소 중...');
    const json = await api('POST', `/api/orders/${order.id}/cancel`);
    setLoading(btn, false);
    if (!json.success) { showToast(json.message||'취소 실패', 'danger'); return; }
    showToast('주문이 취소되었습니다', 'success');
    await loadOrderDetail();
  });

  document.getElementById('detailArea').style.display = '';
}
</script>
</body>
</html>
