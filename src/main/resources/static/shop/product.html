<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>상품 상세 - StockMall</title>
  <link href="/shop/js/bootstrap.min.css" rel="stylesheet">
  <link href="/shop/js/bootstrap-icons.min.css" rel="stylesheet">
  <link href="/shop/js/common.css" rel="stylesheet">
  <style>
    .content-wrap { max-width:960px; margin:0 auto; padding:1.2rem 1rem; }
    .breadcrumb { font-size:.78rem; color:#999; margin-bottom:1rem; }
    .breadcrumb a { color:#888; text-decoration:none; } .breadcrumb a:hover { color:var(--primary); }
    .main-img-wrap { aspect-ratio:1; background:#f5f5f5; border-radius:4px; overflow:hidden; display:flex; align-items:center; justify-content:center; }
    .main-img-wrap img { width:100%; height:100%; object-fit:cover; }
    .thumb-list { display:flex; gap:6px; margin-top:8px; overflow-x:auto; }
    .thumb-item { width:56px; height:56px; object-fit:cover; border-radius:3px; border:2px solid var(--border); cursor:pointer; flex-shrink:0; }
    .thumb-item.active { border-color:var(--primary); }
    .product-name { font-size:1.15rem; font-weight:800; line-height:1.4; }
    .product-price { font-size:1.9rem; font-weight:900; color:var(--primary); letter-spacing:-.5px; }
    .product-price span { font-size:.9rem; font-weight:500; color:#888; margin-left:2px; }
    .inv-chip { display:inline-flex; align-items:center; gap:4px; padding:4px 10px; background:var(--surface); border:1px solid var(--border); border-radius:2px; font-size:.78rem; color:#444; }
    .inv-chip strong { color:#222; }
    .btn-cart { flex:1; padding:.75rem; font-size:.9rem; font-weight:700; border:2px solid var(--primary); background:#fff; color:var(--primary); border-radius:3px; cursor:pointer; transition:all .15s; }
    .btn-cart:hover:not(:disabled) { background:#fff5f2; }
    .btn-buy  { flex:1; padding:.75rem; font-size:.9rem; font-weight:700; background:var(--primary); color:#fff; border:none; border-radius:3px; cursor:pointer; }
    .btn-buy:hover:not(:disabled) { background:var(--primary2); }
    .btn-cart:disabled, .btn-buy:disabled { opacity:.45; cursor:not-allowed; }
    /* 탭 */
    .product-tabs { border-bottom:2px solid var(--border); display:flex; margin-top:2rem; }
    .ptab { padding:.65rem 1.2rem; font-size:.88rem; font-weight:700; cursor:pointer; color:#888; border:none; background:none; border-bottom:2px solid transparent; margin-bottom:-2px; }
    .ptab.active { color:var(--primary); border-bottom-color:var(--primary); }
    /* 리뷰 */
    .review-item { padding:.85rem 0; border-bottom:1px solid var(--border); }
    .review-title { font-weight:700; font-size:.88rem; }
    .review-content { font-size:.83rem; color:#555; margin-top:.3rem; line-height:1.6; }
    .review-meta { font-size:.72rem; color:#aaa; margin-top:.3rem; }
    .star-rating i { font-size:1.1rem; color:#ddd; cursor:pointer; transition:color .1s; }
    .star-rating i.active { color:#f5a623; }
    .avg-score { font-size:2.8rem; font-weight:900; color:var(--primary); line-height:1; }
  </style>
</head>
<body>

<header class="site-header">
  <div class="header-inner">
    <a class="logo" href="/shop/">Stock<em>Mall</em></a>
    <div class="header-actions ms-auto">
      <button class="hdr-btn" id="wishlistBtn"><i class="bi bi-heart"></i><span>찜</span></button>
      <button class="hdr-btn" id="cartBtn">
        <i class="bi bi-cart3"></i><span>장바구니</span>
        <span class="cart-badge" id="cartBadge">0</span>
      </button>
      <button class="hdr-btn d-none" id="myPageBtn"><i class="bi bi-person-lines-fill"></i><span>마이페이지</span></button>
      <button class="hdr-btn" id="loginOpenBtn"><i class="bi bi-person"></i><span>로그인</span></button>
      <div class="hdr-user d-none" id="userInfo">
        <i class="bi bi-person-check-fill"></i>
        <span id="userNameDisplay"></span>
        <button class="btn btn-link p-0 text-muted" style="font-size:.72rem" id="logoutBtn">로그아웃</button>
      </div>
    </div>
  </div>
</header>

<div class="content-wrap">
  <div class="breadcrumb">
    <a href="/shop/">홈</a> &rsaquo; <span id="breadProduct">상품 상세</span>
  </div>

  <div id="loadingArea" class="text-center py-5">
    <div class="spinner-border" style="color:var(--primary)"></div>
  </div>

  <div id="productArea" style="display:none">
    <div class="row g-4">
      <div class="col-md-5">
        <div class="main-img-wrap" id="mainImg">
          <i class="bi bi-image" style="font-size:3rem;color:#ddd"></i>
        </div>
        <div class="thumb-list" id="thumbList"></div>
      </div>
      <div class="col-md-7">
        <div id="statusBadge" class="mb-2"></div>
        <div class="text-muted small mb-1" id="categoryLabel"></div>
        <h1 class="product-name mb-2" id="productName"></h1>
        <div class="product-price mb-1" id="productPrice"></div>
        <div class="text-muted small mb-3" id="productSku"></div>
        <p class="text-secondary mb-3" style="font-size:.88rem;line-height:1.7" id="productDesc"></p>
        <div class="d-flex flex-wrap gap-2 mb-3" id="inventoryChips"></div>
        <div class="d-flex gap-2 mt-3">
          <button class="btn-cart" id="cartBtn2"><i class="bi bi-bag-plus me-1"></i>장바구니</button>
          <button class="btn-buy"  id="buyBtn"><i class="bi bi-lightning-fill me-1"></i>바로구매</button>
        </div>
      </div>
    </div>

    <!-- 탭 -->
    <div class="product-tabs mt-4">
      <button class="ptab active" data-tab="review">리뷰 <span id="reviewCount" class="badge bg-secondary ms-1" style="font-size:.65rem">0</span></button>
    </div>

    <!-- 리뷰 탭 -->
    <div id="tabReview" class="py-3">
      <div class="d-flex align-items-center gap-4 mb-4">
        <div class="text-center">
          <div class="avg-score" id="avgScore">-</div>
          <div style="font-size:.75rem;color:#999;margin-top:3px">평균 평점</div>
        </div>
        <div id="avgStars" style="font-size:1.3rem"></div>
      </div>

      <!-- 리뷰 작성 폼 -->
      <div id="reviewFormWrap" class="p-3 rounded mb-4" style="background:var(--surface);display:none">
        <div class="fw-bold small mb-2">리뷰 작성</div>
        <div class="star-rating mb-2" id="writeStars">
          <i class="bi bi-star-fill" data-val="1"></i>
          <i class="bi bi-star-fill" data-val="2"></i>
          <i class="bi bi-star-fill" data-val="3"></i>
          <i class="bi bi-star-fill" data-val="4"></i>
          <i class="bi bi-star-fill" data-val="5"></i>
        </div>
        <input type="text" id="reviewTitle" class="form-control form-control-sm mb-2" placeholder="제목">
        <textarea id="reviewContent" class="form-control form-control-sm mb-2" rows="3" placeholder="내용"></textarea>
        <button class="btn btn-sm fw-bold" style="background:var(--primary);color:#fff" id="submitReviewBtn">등록</button>
      </div>

      <div id="reviewList"></div>
      <div id="reviewPager" class="pagination-wrap"></div>
    </div>
  </div>
</div>

<div id="toast-container"></div>
<script src="/shop/js/bootstrap.bundle.min.js"></script>
<script src="/shop/js/common.js"></script>
<script>
'use strict';
const productId = +new URLSearchParams(location.search).get('id');
let reviewRating = 5, reviewPageNum = 0;

document.addEventListener('DOMContentLoaded', async () => {
  initHeader();
  if (!productId) { location.href='/shop/'; return; }
  await loadProduct();
  loadReviews(0);
});

async function loadProduct() {
  // 상품 정보는 필수, 이미지/재고는 실패해도 계속
  const pJson = await api('GET', `/api/products/${productId}`);
  document.getElementById('loadingArea').style.display = 'none';
  if (!pJson.success) {
    document.getElementById('loadingArea').innerHTML = '<p class="text-muted text-center py-5">상품을 찾을 수 없습니다.</p>';
    document.getElementById('loadingArea').style.display = '';
    return;
  }
  const [iJson, invJson] = await Promise.all([
    api('GET', `/api/products/${productId}/images`),
    api('GET', `/api/inventory/${productId}`),
  ]);
  const p    = pJson.data;
  const imgs = iJson.success ? (iJson.data ?? []) : [];
  const inv  = invJson.success ? invJson.data : null;

  document.title = `${p.name} - StockMall`;
  document.getElementById('breadProduct').textContent = p.name;
  document.getElementById('productName').textContent  = p.name;
  document.getElementById('categoryLabel').textContent = p.category || '';
  document.getElementById('productSku').textContent   = `SKU: ${p.sku}`;
  document.getElementById('productDesc').textContent  = p.description || '상품 설명이 없습니다.';
  document.getElementById('productPrice').innerHTML   = `${fmtMoney(p.price)}<span>원</span>`;
  document.getElementById('statusBadge').innerHTML    = productStatusBadge(p.status);

  if (inv) {
    const avail = inv.available ?? (inv.onHand - inv.reserved - inv.allocated);
    document.getElementById('inventoryChips').innerHTML = `
      <span class="inv-chip"><i class="bi bi-box-seam"></i> 실재고 <strong>${fmtMoney(inv.onHand)}</strong></span>
      <span class="inv-chip"><i class="bi bi-hourglass-split"></i> 예약 <strong>${inv.reserved}</strong></span>
      <span class="inv-chip" style="color:#1a7f4b"><i class="bi bi-check-circle"></i> 가용 <strong>${fmtMoney(avail)}</strong></span>`;
  }

  // 이미지
  const mainEl  = document.getElementById('mainImg');
  const thumbEl = document.getElementById('thumbList');
  const mainImg = imgs.find(i => i.imageType === 'THUMBNAIL') || imgs[0];
  if (mainImg) {
    mainEl.innerHTML = `<img src="${esc(mainImg.imageUrl)}" alt="${esc(p.name)}">`;
  } else if (p.thumbnailUrl) {
    mainEl.innerHTML = `<img src="${esc(p.thumbnailUrl)}" alt="${esc(p.name)}">`;
  }
  imgs.forEach(img => {
    const el = document.createElement('img');
    el.src = img.imageUrl; el.className = 'thumb-item' + (img === mainImg ? ' active' : '');
    el.addEventListener('click', () => {
      mainEl.innerHTML = `<img src="${esc(img.imageUrl)}" alt="">`;
      document.querySelectorAll('.thumb-item').forEach(t => t.classList.remove('active')); el.classList.add('active');
    });
    thumbEl.appendChild(el);
  });

  const canBuy = p.status === 'ACTIVE';
  document.getElementById('cartBtn2').disabled = !canBuy;
  document.getElementById('buyBtn').disabled   = !canBuy;
  document.getElementById('productArea').style.display = '';
}

// 장바구니 담기
document.getElementById('cartBtn2').addEventListener('click', async () => {
  if (!requireAuth()) return;
  const btn = document.getElementById('cartBtn2');
  setLoading(btn, true, '담는 중...');
  const json = await api('POST', '/api/cart/items', { productId, quantity: 1 });
  setLoading(btn, false);
  if (!json.success) { showToast(json.message || '담기 실패', 'danger'); return; }
  showToast('장바구니에 담았습니다', 'success');
  loadCartCount();
});

// 바로구매
document.getElementById('buyBtn').addEventListener('click', async () => {
  if (!requireAuth()) return;
  const btn = document.getElementById('buyBtn');
  setLoading(btn, true, '처리 중...');
  const json = await api('POST', '/api/cart/items', { productId, quantity: 1 });
  setLoading(btn, false);
  if (!json.success) { showToast(json.message || '담기 실패', 'danger'); return; }
  loadCartCount();
  location.href = '/shop/checkout.html';
});

// 리뷰
async function loadReviews(page) {
  reviewPageNum = page;
  const json = await api('GET', `/api/products/${productId}/reviews?page=${page}&size=5`);
  if (!json.success) return;
  const reviews    = json.data.content ?? [];
  const totalPages = json.data.totalPages ?? 1;
  const total      = json.data.totalElements ?? 0;
  document.getElementById('reviewCount').textContent = total;
  // 평균 평점은 API에서 제공하는 값 사용, 없으면 현재 페이지 계산
  const avg = json.data.avgRating ?? (reviews.length ? reviews.reduce((s,r) => s + r.rating, 0) / reviews.length : 0);
  document.getElementById('avgScore').textContent = total ? avg.toFixed(1) : '-';
  document.getElementById('avgStars').innerHTML = total ? starHtml(avg) : '';

  // 리뷰 작성 폼: 로그인 여부만 확인 (구매 검증은 서버에서 처리)
  document.getElementById('reviewFormWrap').style.display = isLoggedIn() ? '' : 'none';

  if (!reviews.length) {
    document.getElementById('reviewList').innerHTML = '<div class="text-muted small text-center py-4">아직 리뷰가 없습니다</div>';
    document.getElementById('reviewPager').innerHTML = '';
    return;
  }
  document.getElementById('reviewList').innerHTML = reviews.map(r => `
    <div class="review-item">
      <div class="d-flex justify-content-between">
        <div style="color:#f5a623;font-size:.9rem">${starHtml(r.rating)}</div>
        <div class="review-meta">${fmtDate(r.createdAt)}</div>
      </div>
      <div class="review-title mt-1">${esc(r.title)}</div>
      <div class="review-content">${esc(r.content)}</div>
    </div>`).join('');
  renderPager('reviewPager', page, totalPages, loadReviews);
}

// 별점 입력
let hoverRating = 0;
document.getElementById('writeStars').addEventListener('mouseover', e => {
  const star = e.target.closest('[data-val]'); if (!star) return;
  hoverRating = +star.dataset.val;
  document.querySelectorAll('#writeStars i').forEach(i => i.classList.toggle('active', +i.dataset.val <= hoverRating));
});
document.getElementById('writeStars').addEventListener('mouseleave', () => {
  hoverRating = 0;
  document.querySelectorAll('#writeStars i').forEach(i => i.classList.toggle('active', +i.dataset.val <= reviewRating));
});
document.getElementById('writeStars').addEventListener('click', e => {
  const star = e.target.closest('[data-val]'); if (!star) return;
  reviewRating = +star.dataset.val;
  document.querySelectorAll('#writeStars i').forEach(i => i.classList.toggle('active', +i.dataset.val <= reviewRating));
});
// 초기 별점 표시
document.querySelectorAll('#writeStars i').forEach(i => i.classList.toggle('active', +i.dataset.val <= reviewRating));

document.getElementById('submitReviewBtn').addEventListener('click', async () => {
  const title   = document.getElementById('reviewTitle').value.trim();
  const content = document.getElementById('reviewContent').value.trim();
  if (!title || !content) { showToast('제목과 내용을 입력하세요', 'danger'); return; }
  const btn = document.getElementById('submitReviewBtn');
  setLoading(btn, true, '등록 중...');
  const json = await api('POST', `/api/products/${productId}/reviews`, { rating: reviewRating, title, content });
  setLoading(btn, false);
  if (!json.success) { showToast(json.message || '등록 실패', 'danger'); return; }
  showToast('리뷰가 등록되었습니다', 'success');
  document.getElementById('reviewTitle').value = '';
  document.getElementById('reviewContent').value = '';
  reviewRating = 5;
  document.querySelectorAll('#writeStars i').forEach(i => i.classList.toggle('active', +i.dataset.val <= 5));
  loadReviews(0);
});
</script>
</body>
</html>
