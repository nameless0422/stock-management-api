spring.application.name=stock-management-api

# ===== Database =====
spring.datasource.url=jdbc:mysql://127.0.0.1:3306/stock_management?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===== HikariCP 커넥션 풀 =====
# 권장 공식: (CPU 코어 수 × 2) + 유효 스핀들 수
# 로컬/단일 인스턴스 기준 20으로 설정 (운영 환경에서 부하에 맞게 조정)
spring.datasource.hikari.pool-name=StockMgmtPool
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
# 커넥션 누수 감지: 60초 이상 반납 안 되면 WARN 로그
spring.datasource.hikari.leak-detection-threshold=60000

# ===== JPA =====
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
# @ManyToOne 등 단일 엔티티 레퍼런스도 IN 절 배치 로딩으로 N+1 방지
spring.jpa.properties.hibernate.default_batch_fetch_size=50
spring.jpa.open-in-view=false

# ===== Flyway =====
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration

# ===== JWT =====
# Override with environment variable: JWT_SECRET (최소 32자 이상)
jwt.secret=${JWT_SECRET:stock-management-secret-key-for-development-only}
jwt.token-validity-in-seconds=86400

# ===== Redis =====
spring.data.redis.host=localhost
spring.data.redis.port=6379

# ===== Elasticsearch =====
spring.elasticsearch.uris=http://localhost:9200

# ===== Cache =====
spring.cache.type=redis

# ===== Spring Boot Admin =====
spring.boot.admin.context-path=/admin-ui
spring.boot.admin.client.url=http://localhost:8081/admin-ui
spring.boot.admin.client.username=${ADMIN_USERNAME:admin}
spring.boot.admin.client.password=${ADMIN_PASSWORD:changeme}

# Admin 계정 (SBA Form Login — 운영 시 환경변수 ADMIN_USERNAME/ADMIN_PASSWORD 사용)
admin.username=${ADMIN_USERNAME:admin}
admin.password=${ADMIN_PASSWORD:changeme}

# ===== Graceful Shutdown =====
# 종료 시 진행 중인 요청을 최대 30초 기다린 후 종료
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=30s

# ===== Actuator =====
# prometheus는 SecurityConfig에서 ADMIN 전용으로 제한
management.endpoints.web.exposure.include=health,info,metrics,loggers,env,beans,prometheus
management.endpoint.health.show-details=when-authorized
management.endpoint.health.probes.enabled=true
management.info.env.enabled=true

# ===== Micrometer 메트릭 =====
management.metrics.tags.application=${spring.application.name}

# ===== 분산 추적 (Micrometer Tracing + Zipkin) =====
# 운영: 1.0 (전수 수집), 개발: 0.1 (10% 샘플링)
management.tracing.sampling.probability=1.0
management.zipkin.tracing.endpoint=http://localhost:9411/api/v2/spans

# ===== CORS =====
# 프로덕션에서는 환경변수 CORS_ALLOWED_ORIGINS로 실제 도메인 지정
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000}

# ===== TossPayments =====
# Override with environment variables in production: TOSS_SECRET_KEY, TOSS_CLIENT_KEY
toss.secret-key=${TOSS_SECRET_KEY:test_sk_placeholder}
toss.client-key=${TOSS_CLIENT_KEY:test_ck_placeholder}
toss.base-url=https://api.tosspayments.com/v1
toss.connect-timeout-ms=5000
toss.read-timeout-ms=30000

# ===== 주문 만료 자동 취소 =====
# 30분 초과 PENDING 주문을 5분마다 자동 취소 (재고 예약 누수 방지)
order.expiry.minutes=30
order.expiry.check-interval-ms=300000
order.expiry.enabled=true

# ===== 쿠폰 만료 자동 비활성화 (매일 새벽 1시) =====
coupon.expiry.enabled=true
coupon.expiry.cron=0 0 1 * * *

# ===== 일별 재고 스냅샷 (매일 자정 5분) =====
inventory.snapshot.enabled=true
inventory.snapshot.cron=0 5 0 * * *

# ===== 일별 주문·매출 통계 (매일 자정 1분) =====
order.stats.enabled=true
order.stats.cron=0 1 0 * * *

# ===== Object Storage (MinIO / S3 호환) =====
# storage.enabled=true 로 변경 시 S3StorageService 빈이 생성되어 Presigned URL 기능 활성화.
# false(기본값)이면 StorageConfig가 빈을 생성하지 않으므로 파일 업로드 API가 503을 반환한다.
# 통합 테스트(application-integration.properties)에서는 항상 false로 유지한다.
storage.enabled=false
storage.endpoint=${STORAGE_ENDPOINT:http://localhost:9000}
storage.access-key=${STORAGE_ACCESS_KEY:minioadmin}
storage.secret-key=${STORAGE_SECRET_KEY:minioadmin}
storage.bucket=${STORAGE_BUCKET:stock-management}
storage.public-url=${STORAGE_PUBLIC_URL:http://localhost:9000}
storage.presigned-expiry-minutes=10

# ===== TossPayments Circuit Breaker =====
resilience4j.circuitbreaker.instances.tossPayments.sliding-window-type=COUNT_BASED
resilience4j.circuitbreaker.instances.tossPayments.sliding-window-size=10
resilience4j.circuitbreaker.instances.tossPayments.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.tossPayments.slow-call-rate-threshold=80
resilience4j.circuitbreaker.instances.tossPayments.slow-call-duration-threshold=3s
resilience4j.circuitbreaker.instances.tossPayments.wait-duration-in-open-state=30s
resilience4j.circuitbreaker.instances.tossPayments.permitted-number-of-calls-in-half-open-state=3
resilience4j.circuitbreaker.instances.tossPayments.automatic-transition-from-open-to-half-open-enabled=true
resilience4j.circuitbreaker.instances.tossPayments.ignore-exceptions=com.stockmanagement.common.exception.BusinessException

# ===== Email =====
# mail.enabled=true 로 변경 후 아래 SMTP 설정 필요
mail.enabled=false
mail.from=noreply@stockmall.com
# spring.mail.host=smtp.gmail.com
# spring.mail.port=587
# spring.mail.username=${MAIL_USERNAME}
# spring.mail.password=${MAIL_PASSWORD}
# spring.mail.properties.mail.smtp.auth=true
# spring.mail.properties.mail.smtp.starttls.enable=true

# ===== Transactional Outbox Relay =====
# 5초마다 미발행 이벤트를 읽어 ApplicationEventPublisher로 relay
outbox.relay.enabled=true
outbox.relay.interval-ms=5000
# 1회 relay 배치 크기. 적체 복구 속도(값 증가) vs DB 부하(값 감소) 조정
outbox.relay.batch-size=100

# ===== Transactional Outbox Purge =====
# 매일 새벽 3시, 발행 완료 후 7일 이상 경과한 레코드 정리
outbox.purge.enabled=true
outbox.purge.cron=0 0 3 * * *
outbox.purge.retention-days=7

# ===== Email Retry (Resilience4j) =====
# SMTP 일시 장애 시 최대 3회 재시도 (2초 간격)
resilience4j.retry.instances.email.max-attempts=3
resilience4j.retry.instances.email.wait-duration=2s
resilience4j.retry.instances.email.retry-exceptions=jakarta.mail.MessagingException,org.springframework.mail.MailException
