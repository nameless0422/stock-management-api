spring.application.name=stock-management-api

# ===== Database =====
spring.datasource.url=jdbc:mysql://127.0.0.1:3306/stock_management?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===== JPA =====
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

# ===== Flyway =====
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration

# ===== JWT =====
# Override with environment variable: JWT_SECRET (최소 32자 이상)
jwt.secret=${JWT_SECRET:stock-management-secret-key-for-development-only}
jwt.token-validity-in-seconds=86400

# ===== Redis =====
spring.data.redis.host=localhost
spring.data.redis.port=6379

# ===== Elasticsearch =====
spring.elasticsearch.uris=http://localhost:9200

# ===== Cache =====
spring.cache.type=redis

# ===== Spring Boot Admin =====
spring.boot.admin.context-path=/admin-ui
spring.boot.admin.client.url=http://localhost:8081/admin-ui
spring.boot.admin.client.username=${ADMIN_USERNAME:admin}
spring.boot.admin.client.password=${ADMIN_PASSWORD:changeme}

# Admin 계정 (SBA Form Login — 운영 시 환경변수 ADMIN_USERNAME/ADMIN_PASSWORD 사용)
admin.username=${ADMIN_USERNAME:admin}
admin.password=${ADMIN_PASSWORD:changeme}

# ===== Actuator =====
# 공개: health, info 만 노출 / 나머지는 SecurityConfig에서 ADMIN 전용으로 제한
management.endpoints.web.exposure.include=health,info,metrics,loggers,env,beans
management.endpoint.health.show-details=when-authorized
management.info.env.enabled=true

# ===== CORS =====
# 프로덕션에서는 환경변수 CORS_ALLOWED_ORIGINS로 실제 도메인 지정
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000}

# ===== TossPayments =====
# Override with environment variables in production: TOSS_SECRET_KEY, TOSS_CLIENT_KEY
toss.secret-key=${TOSS_SECRET_KEY:test_sk_placeholder}
toss.client-key=${TOSS_CLIENT_KEY:test_ck_placeholder}
toss.base-url=https://api.tosspayments.com/v1
toss.connect-timeout-ms=5000
toss.read-timeout-ms=30000

# ===== 주문 만료 자동 취소 =====
# 30분 초과 PENDING 주문을 5분마다 자동 취소 (재고 예약 누수 방지)
order.expiry.minutes=30
order.expiry.check-interval-ms=300000
order.expiry.enabled=true

# ===== TossPayments Circuit Breaker =====
resilience4j.circuitbreaker.instances.tossPayments.sliding-window-type=COUNT_BASED
resilience4j.circuitbreaker.instances.tossPayments.sliding-window-size=10
resilience4j.circuitbreaker.instances.tossPayments.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.tossPayments.slow-call-rate-threshold=80
resilience4j.circuitbreaker.instances.tossPayments.slow-call-duration-threshold=3s
resilience4j.circuitbreaker.instances.tossPayments.wait-duration-in-open-state=30s
resilience4j.circuitbreaker.instances.tossPayments.permitted-number-of-calls-in-half-open-state=3
resilience4j.circuitbreaker.instances.tossPayments.automatic-transition-from-open-to-half-open-enabled=true
resilience4j.circuitbreaker.instances.tossPayments.ignore-exceptions=com.stockmanagement.common.exception.BusinessException
