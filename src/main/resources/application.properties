spring.application.name=stock-management-api

# ===== Database =====
spring.datasource.url=jdbc:mysql://localhost:3306/stock_management?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===== JPA =====
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

# ===== Flyway =====
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration

# ===== JWT =====
# Override with environment variable: JWT_SECRET (최소 32자 이상)
jwt.secret=${JWT_SECRET:stock-management-secret-key-for-development-only}
jwt.token-validity-in-seconds=86400

# ===== Redis =====
spring.data.redis.host=localhost
spring.data.redis.port=6379

# ===== Cache =====
spring.cache.type=redis

# ===== TossPayments =====
# Override with environment variables in production: TOSS_SECRET_KEY, TOSS_CLIENT_KEY
toss.secret-key=${TOSS_SECRET_KEY:test_sk_placeholder}
toss.client-key=${TOSS_CLIENT_KEY:test_ck_placeholder}
toss.base-url=https://api.tosspayments.com/v1
