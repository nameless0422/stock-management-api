# P6Spy 설정 — SQL 실행 로그 및 슬로우 쿼리 감지

# SLF4J를 통해 logback으로 출력
appender=com.p6spy.engine.spy.appender.Slf4JLogger

# 로그 포맷: 실행시간(ms) | 실제 파라미터가 바인딩된 SQL
logMessageFormat=com.p6spy.engine.spy.appender.CustomLineFormat
customLogMessageFormat=[P6Spy] %(executionTime)ms | %(sql)

# 100ms 이상 걸린 쿼리는 WARN 레벨로 출력 (슬로우 쿼리 감지)
executionThreshold=100

# SELECT/INSERT/UPDATE/DELETE만 로깅 (커넥션/롤백 이벤트 제외)
filter=true
include=select,insert,update,delete
