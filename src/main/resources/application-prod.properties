# ================================================================
# Production Profile Overrides
#
# 사용법: --spring.profiles.active=prod 으로 활성화
# 모든 민감 값은 환경변수 필수 — 기본값(fallback) 없음
# 환경변수 미설정 시 애플리케이션 기동 실패 (의도된 동작)
# ================================================================

# ===== Database (prod: 환경변수 필수) =====
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# ===== JWT =====
jwt.secret=${JWT_SECRET}

# ===== Redis =====
spring.data.redis.host=${REDIS_HOST}
spring.data.redis.port=${REDIS_PORT:6379}

# ===== Elasticsearch =====
spring.elasticsearch.uris=${ELASTICSEARCH_URI}

# ===== Spring Boot Admin 계정 =====
admin.username=${ADMIN_USERNAME}
admin.password=${ADMIN_PASSWORD}
spring.boot.admin.client.username=${ADMIN_USERNAME}
spring.boot.admin.client.password=${ADMIN_PASSWORD}

# ===== Object Storage =====
storage.enabled=true
storage.endpoint=${STORAGE_ENDPOINT}
storage.access-key=${STORAGE_ACCESS_KEY}
storage.secret-key=${STORAGE_SECRET_KEY}
storage.bucket=${STORAGE_BUCKET}
storage.public-url=${STORAGE_PUBLIC_URL}

# ===== TossPayments =====
toss.secret-key=${TOSS_SECRET_KEY}
toss.client-key=${TOSS_CLIENT_KEY}

# ===== Email =====
mail.enabled=true
spring.mail.host=${MAIL_HOST}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ===== CORS =====
cors.allowed-origins=${CORS_ALLOWED_ORIGINS}

# ===== Tracing (prod: 10% 샘플링) =====
management.tracing.sampling.probability=0.1
management.zipkin.tracing.endpoint=${ZIPKIN_ENDPOINT:http://zipkin:9411/api/v2/spans}

# ===== Rate Limit (prod: 프록시 뒤에 있으므로 명시적 설정) =====
rate-limit.trust-proxy=true

# ===== P6Spy 비활성화 (prod: SQL 로깅 불필요) =====
decorator.datasource.p6spy.enable-logging=false
